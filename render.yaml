services:
  - type: web
    name: inventory-alert-server
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: inventory-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: TOSS_WEBHOOK_SECRET
        sync: false
      - key: TOSS_SECRET_KEY
        sync: false

  - type: web
    name: inventory-alert-client
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          name: inventory-alert-server
          type: web
          property: host
      - key: VITE_TOSS_CLIENT_KEY
        sync: false

databases:
  - name: inventory-db
    plan: free
